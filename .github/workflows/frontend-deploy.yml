name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "next.config.ts"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      NEXT_PUBLIC_SITE_URL: https://hotengroup.com
      NEXT_PUBLIC_API_BASE_URL: https://pikvgdvqt7.us-east-1.awsapprunner.com/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_FRONTEND }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Sync out/ to S3
        run: aws s3 sync out/ s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"