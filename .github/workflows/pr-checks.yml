name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

  backend-compile:
    name: Backend compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile backend Python
        run: python -m compileall backend/app

  infra-checks:
    name: Infra build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        working-directory: infra
        run: npm ci

      - name: Build CDK app
        working-directory: infra
        run: npm run build

      - name: Run infra tests
        working-directory: infra
        run: npm test
